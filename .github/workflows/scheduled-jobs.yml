name: TaskFlow Scheduled Jobs

on:
  schedule:
    # Keep-alive: daily at 6 AM UTC
    - cron: '0 6 * * *'
    # Process alerts: every 6 hours
    - cron: '0 */6 * * *'
    # Weekly backup: Sunday at 2 AM UTC
    - cron: '0 2 * * 0'

  workflow_dispatch: # Allow manual trigger

jobs:
  keep-alive:
    if: github.event.schedule == '0 6 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s "${{ secrets.SUPABASE_URL }}/functions/v1/keep-alive" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json"

  process-alerts:
    if: github.event.schedule == '0 */6 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Process Alerts
        run: |
          curl -s "${{ secrets.SUPABASE_URL }}/functions/v1/process-alerts" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json"

  weekly-backup:
    if: github.event.schedule == '0 2 * * 0' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Run Backup
        run: |
          curl -s "${{ secrets.SUPABASE_URL }}/functions/v1/weekly-backup" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json"
